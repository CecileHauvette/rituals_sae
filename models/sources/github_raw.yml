sources:
  - name: github_raw
    description: >
      Raw GitHub API payloads for the dbt-labs/dbt-core repository
    database: ritualscase
    schema: github_raw
    tables:
      - name: raw_commits
        identifier: raw_commits
        description: >
          One row per commit ingested. 
        columns:
          - name: record_id
            description: commit identifier.
            tests:
              - not_null
          - name: data
            description: Full JSON payload from the GitHub Commits API.
            tests:
              - not_null
          - name: loaded_at
            description: UTC timestamp when this row was written by the ingestion script.
            tests:
              - not_null
          - name: batch_id
            description: UUID identifying the script run that produced this row.
            tests:
              - not_null

      - name: raw_pull_requests
        identifier: raw_pull_requests
        description: >
          One row per (PR, ingestion run) snapshot. 
        columns:
          - name: record_id
            description: >
              GitHub PR numeric id
            tests:
              - not_null
          - name: data
            description: Full JSON payload from the GitHub Pull Requests API.
            tests:
              - not_null
          - name: loaded_at
            description: UTC timestamp when this row was written by the ingestion script.
            tests:
              - not_null
          - name: batch_id
            description: UUID identifying the script run that produced this row.
            tests:
              - not_null

      - name: raw_issues
        description: >
          One row per (issue, ingestion run) snapshot.
        columns:
          - name: record_id
            description: >
              GitHub issue numeric id.
            tests:
              - not_null
          - name: data
            description: Full JSON payload from the GitHub Issues API.
            tests:
              - not_null
          - name: loaded_at
            description: UTC timestamp when this row was written by the ingestion script.
            tests:
              - not_null
          - name: batch_id
            description: UUID identifying the script run that produced this row.
            tests:
              - not_null